name: Auto Fetch Sky APK Link

on:
  schedule:
    - cron: '*/15 * * * *' # 每 15 分鐘執行一次
  workflow_dispatch: # 允許手動觸發

jobs:
  update-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 確保有權限推送到 Repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Python Script
        env:
          # 將 GitHub Secrets 映射至環境變數
          API_URL: ${{ secrets.API_URL }}
          PKG_NAME: ${{ secrets.PKG_NAME }}
        run: python fetch_app_info.py

      - name: Commit and Push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add history.json
          # 如果 json 沒有變動，不會報錯並正常結束
          git commit -m "Auto-update download link history" || echo "No changes to commit"
          git push
